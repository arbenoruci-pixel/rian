<!DOCTYPE html>

<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>PRANIMI</title>
<style>
:root{
  --bg:#000; --ink:#fff; --muted:#b9c4da;
  --panel:#0c0f16; --panel-br:#273143; --line:#2c3954;
  --chip-bg:#121829; --chip-br:#2c3a55; --chip-ink:#e6f0ff;
  --btn:#1e60ff; --btn-ink:#fff; --danger:#ef4444;
  --green:#16a34a; --amber:#c78a2a; --blue:#1e60ff;
  --uiScale:.85; --h:56px; --rad:14px;
  --fs:calc(16px*var(--uiScale));
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:ui-rounded,system-ui,-apple-system,Segoe UI,Roboto,Arial;font-size:var(--fs);line-height:1.25}
.wrap{max-width:980px;margin:0 auto;padding:0 16px 120px}
h1{font-size:clamp(34px,5.4vw,50px);margin:20px 6px 6px;font-weight:1000;letter-spacing:.01em;display:flex;align-items:center;gap:12px}
.badge{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(180deg,rgba(34,197,94,.18),rgba(34,197,94,.08));border:1px solid rgba(34,197,94,.6);color:#d8ffe9;padding:10px 16px;border-radius:999px;font-weight:1000;font-size:1.1rem}
.card{background:var(--panel);border:1px solid var(--panel-br);border-radius:18px;padding:18px;margin:16px 0;box-shadow:0 12px 40px rgba(0,0,0,.55)}
.title{display:flex;align-items:center;justify-content:space-between;font-size:clamp(20px,2.6vw,28px);font-weight:1000;margin-bottom:12px}
label{font-size:.9rem;color:var(--muted);font-weight:900;letter-spacing:.03em}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media (max-width:720px){.row{grid-template-columns:1fr}}
.input{width:100%;min-height:56px;background:#070a12;border:2px solid var(--line);border-radius:14px;padding:14px 16px;font-size:1.25rem;font-weight:1000;color:var(--ink);outline:none}
.input:focus{border-color:#6aa1ff;box-shadow:0 0 0 3px rgba(30,96,255,.25)}
.chips{display:flex;flex-wrap:wrap;gap:12px;padding:6px 0}
.chip{border:2px solid var(--chip-br);background:var(--chip-bg);color:var(--chip-ink);border-radius:999px;padding:10px 16px;min-height:56px;font-weight:1000}
.chip:active,.chip:hover{background:#18223a}
.list{display:flex;flex-direction:column;gap:4px;margin-top:4px}
.piece-row{display:grid;grid-template-columns: 1fr 58px;gap:4px;align-items:center;margin-top:2px}
.mwrap{display:flex;align-items:center;gap:6px}
.piece-row .input{min-height:44px;border-radius:10px;font-size:1.05rem;line-height:1.1;padding:8px;border-width:1px}
.piece-row .piece-input{ font-weight:900; }
.cam-btn{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;min-width:44px;border:1px solid #2b3956;border-radius:10px;background:#0a1220;color:#e6f0ff;font-size:16px;cursor:pointer;padding:0}
.thumb{width:44px;height:44px;border-radius:10px;object-fit:cover;border:1px solid #2b3956;display:none;cursor:pointer}
.btnbar{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
.btn{border:0;border-radius:14px;padding:14px 18px;min-height:56px;font-weight:1000;font-size:1.05rem;cursor:pointer;background:var(--btn);color:var(--btn-ink)}
.btn.red{background:var(--danger)}
.btn.ghost{background:#0c1220;color:#e6f0ff;border:2px solid #2b3956}
.pill,.tot{display:flex;justify-content:space-between;align-items:center;background:#0b111d;border:1px solid var(--panel-br);border-radius:12px;padding:10px 12px;font-weight:1000}
.tot{margin-top:8px}
.footer{position:fixed;left:0;right:0;bottom:0;z-index:10;background:rgba(5,7,12,.97);border-top:1px solid var(--panel-br);backdrop-filter:blur(6px)}
.footwrap{max-width:980px;margin:0 auto;padding:12px 16px;display:grid;grid-template-columns:auto auto auto;gap:12px;align-items:center;justify-content:space-between}
a.btn{text-decoration:none;display:inline-flex;align-items:center;justify-content:center}

/* KOD button at header (fixed size) */
#btnFindCode{min-height:40px;height:40px;padding:8px 12px;border-radius:12px;border:1px solid #2b3956;background:#0a1220;color:#d8ffe9;font-weight:1000}

/* UTIL ICON ROW (static) */
.utilRow{display:flex;gap:10px;margin-top:12px}
.utilBtn{flex:1;display:flex;align-items:center;justify-content:center;height:48px;border-radius:12px;border:1px solid #2b3956;font-weight:1000;cursor:pointer;user-select:none}
.btn-sh{background:linear-gradient(180deg,rgba(120,180,255,.12),rgba(120,180,255,.05))}
.btn-sms{background:linear-gradient(180deg,rgba(120,255,160,.12),rgba(120,255,160,.05))}
.btn-eur{background:linear-gradient(180deg,rgba(255,220,140,.12),rgba(255,220,140,.05))}
.utilBtn:active{transform:scale(.99)}

/* bottom sheet */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:flex-end;justify-content:center;z-index:99999}
.sheet{background:#0c0f16;border:1px solid #273143;border-radius:14px 14px 0 0;width:100%;max-width:720px;padding:16px}
.sheet h3{margin:0 0 10px;font-size:1.25rem}
.sheet p{margin:0 0 12px;color:#cfe0ff}
.hint{color:#cbd7ef;font-size:.9rem;margin-top:8px}

<script>
/* ====== KONFIG ====== */
const CFG = {
  supabase: {
    url: "https://vnidjrxidvusulinozbn.supabase.co",
    anonKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZuaWRqcnhpZHZ1c3VsaW5vemJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc1MTk0NjAsImV4cCI6MjA3MzA5NTQ2MH0.hzGSFKU3sKuUKBUBsTE0rKIerj2uhG9pGS8_K9N7tpA",
    bucket: "tepiha-photos"
  },
  syncOrders: true,
  codeLeaseMinutes: 30,
  uniqueLocks: true
};

const sb = (typeof window!=='undefined' && window.supabase && CFG.supabase.url && CFG.supabase.anonKey)
  ? window.supabase.createClient(CFG.supabase.url, CFG.supabase.anonKey)
  : null;

/* ====== HELPERS ====== */
const q=s=>document.querySelector(s), qq=s=>Array.from(document.querySelectorAll(s));
const r2=x=>Math.round((x+Number.EPSILON)*100)/100;
const LIST_KEY='order_list_v1'; const KEY=id=>'order_'+id;

/* ====== PHOTO STORE (HEIC->JPEG + Supabase/IndexedDB fallback) ====== */
(function(){
  const DB_NAME='tepiha_photos_v1', STORE='photos'; let _db;
  function openDB(){return new Promise((res,rej)=>{ if(_db)return res(_db); const r=indexedDB.open(DB_NAME,1); r.onupgradeneeded=e=>e.target.result.createObjectStore(STORE); r.onsuccess=e=>{_db=e.target.result;res(_db)}; r.onerror=e=>rej(e.target.error) }) }
  async function idbPut(key, blob){ const db=await openDB(); return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite'); tx.objectStore(STORE).put(blob,key); tx.oncomplete=()=>res(true); tx.onerror=e=>rej(e.target.error)}) }
  async function idbGet(key){ const db=await openDB(); return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly'); const rq=tx.objectStore(STORE).get(key); rq.onsuccess=()=>res(rq.result||null); rq.onerror=e=>rej(e.target.error)}) }
  function fileToJpegBlob(file,maxW=1280,quality=.7){
    return new Promise((resolve,reject)=>{
      const img=new Image(), fr=new FileReader();
      fr.onload=()=>{img.src=fr.result}; fr.onerror=reject;
      img.onload=()=>{
        const scale=Math.min(1,maxW/(img.width||maxW)), c=document.createElement('canvas');
        c.width=Math.round((img.width||maxW)*scale); c.height=Math.round((img.height||maxW)*scale);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        c.toBlob(b=> b?resolve(b):reject(new Error('toBlob failed')), 'image/jpeg', quality);
      }; img.onerror=reject; fr.readAsDataURL(file);
    });
  }
  async function savePhoto(key, file){
    try{
      const jpeg = await fileToJpegBlob(file, 1280, .7);
      if(sb){
        const path = `${(window.OID||'ord')}/${key}_${Date.now()}.jpg`;
        const { error } = sb.storage.from(CFG.supabase.bucket)
          .upload(path, jpeg, { upsert:false, contentType:'image/jpeg' });
        if (error) throw error;
        const { data } = sb.storage.from(CFG.supabase.bucket).getPublicUrl(path);
        const url = data.publicUrl; if(!url) throw new Error('Public URL bosh');
        localStorage.setItem(key+'_url', url);
        return url;
      }else{
        await idbPut(key, jpeg);
        const objUrl = URL.createObjectURL(jpeg);
        sessionStorage.setItem(key+'_objurl', objUrl);
        return objUrl;
      }
    }catch(err){
      alert('Foto s’u ruajt: '+(err?.message||err));
      throw err;
    }
  }
  async function getPhotoUrl(key){
    const direct=localStorage.getItem(key+'_url'); if(direct) return direct;
    const fast=sessionStorage.getItem(key+'_objurl'); if(fast) return fast;
    const blob=await idbGet(key); if(!blob) return null;
    const url=URL.createObjectURL(blob); sessionStorage.setItem(key+'_objurl', url); return url;
  }
  function preview(url){
    const ov=document.createElement('div'); ov.className='ov';
    const im=document.createElement('img'); im.src=url; im.style.cssText='max-width:96%;max-height:92%;border-radius:10px';
    ov.appendChild(im); ov.addEventListener('click',()=>ov.remove()); document.body.appendChild(ov);
  }
  window._photoAPI={savePhoto,getPhotoUrl,preview};
})();

/* ====== ORDER/ID + CODE ====== */
function parseQS(){ const p=new URLSearchParams(location.search); const id=p.get('id'); return {id}; }
const hid=q('#orderId'); const qs=parseQS();
if(qs.id){ hid.value=qs.id; }
if(!hid.value) hid.value='ord_'+Date.now();
window.OID=hid.value;

/* ******* DASH CODE SYSTEM (no 'X' anywhere) ******* */
/* Reserve shared code with 30m lease; returns "-n" */
async function reserveDashCode(){
  // Unified: use new minus-only code system managed in assets/app.js
  try{
    if (typeof window.claimNextCode === 'function'){
      var r = window.claimNextCode();
      if (r && r.code) return r.code;
    }
  }catch(_){}
  // Legacy fallback in case app.js didn't load for some reason
  var n = parseInt(localStorage.getItem('code_counter')||'0',10) || 0;
  n += 1; localStorage.setItem('code_counter', String(n));
  return '-' + n;
}
  const leaseMs=(CFG.codeLeaseMinutes||30)*60*1000, now=Date.now();
  const { data:list, error } = await sb.storage.from(CFG.supabase.bucket)
    .list('codes', { limit: 10000, sortBy:{column:'name',order:'asc'} });
  if(error && error.message!=='The resource was not found'){
    let n=parseInt(localStorage.getItem('code_counter')||'0',10)||0;
    n+=1; localStorage.setItem('code_counter', String(n));
    return '-'+n;
  }
  const used=new Set(), active=new Set(), expired=[];
  (list||[]).forEach(f=>{
    const nm=f.name||'';
    let m=/^(?:x|d)(\d+)\.(?:used|json)$/i.exec(nm); if(m){ used.add(parseInt(m[1],10)); return; }
    m=/^(?:x|d)(\d+)\.(\d+)\.lock$/i.exec(nm);
    if(m){
      const n=parseInt(m[1],10), ts=parseInt(m[2],10);
      if(isFinite(ts) && (Date.now()-ts)<=leaseMs) active.add(n);
      else expired.push('codes/'+nm);
      return;
    }
    m=/^(?:x|d)(\d+)\.lock$/i.exec(nm); if(m){ active.add(parseInt(m[1],10)); }
  });
  if(expired.length){ try{ await sb.storage.from(CFG.supabase.bucket).remove(expired); }catch(e){} }
  function nextFree(){ let n=1; while(used.has(n)||active.has(n)) n++; return n; }
  for(let tries=0; tries<200; tries++){
    const n=nextFree();
    const path=`codes/d${n}.${now}.lock`;
    const blob=new Blob([String(now)],{type:'text/plain'});
    const { error:upErr } = await sb.storage.from(CFG.supabase.bucket)
      .upload(path, blob, { upsert:false, contentType:'text/plain' });
    if(!upErr) return '-'+n;
    await new Promise(r=>setTimeout(r,50));
  }
  let n=parseInt(localStorage.getItem('code_counter')||'0',10)||0;
  n+=1; localStorage.setItem('code_counter', String(n));
  return '-'+n;
}

/* Show code exactly as provided (already '-n') */
function displayCode(code){
  (q('#ticketCode')||{}).textContent = 'KODI: ' + (code || '——');
}

/* ====== UNIQUE CLIENT LOCKS (phone/name) ====== */
function sanitizePhone(full){ return (full||'').replace(/[^\d]/g,''); }
function normalizeName(n){ return (n||'').trim().replace(/\s+/g,' ').toLowerCase(); }
async function tryReserveUnique(name, phoneDigits){
  if(!CFG.uniqueLocks || !sb) return {ok:true};
  const nm = normalizeName(name);
  if(!nm || !phoneDigits){ return {ok:false, reason:'name_phone_missing'}; }
  const nameKey = 'clients/name/'+encodeURIComponent(nm)+'.lock';
  const phoneKey = 'clients/phone/'+phoneDigits+'.lock';
  const blob = new Blob([String(Date.now())], {type:'text/plain'});
  const r1 = await sb.storage.from(CFG.supabase.bucket).upload(phoneKey, blob, { upsert:false, contentType:'text/plain' });
  if(r1.error){ return {ok:false, reason:'phone_exists'}; }
  const r2 = await sb.storage.from(CFG.supabase.bucket).upload(nameKey, blob, { upsert:false, contentType:'text/plain' });
  if(r2.error){ try{ await sb.storage.from(CFG.supabase.bucket).remove([phoneKey]); }catch(e){}; return {ok:false, reason:'name_exists'}; }
  const locks = { nameKey, phoneKey, ts: Date.now() };
  try{ localStorage.setItem('lock_'+phoneDigits, JSON.stringify(locks)); }catch(e){}
  return {ok:true};
}

/* ====== DATA helpers ====== */
function readRows(listId){
  const list=q('#list-'+listId); if(!list) return [];
  return qq('.piece-row', list).map(row=>({
    m2: parseFloat((row.querySelector('.piece-input')||{}).value||'0')||0,
    qty: parseFloat((row.querySelector('.piece-qty')||{}).value||'1')||1,
    photoKey: row.getAttribute('data-photo-key')
  }));
}
function totalsObj(){
  const m2=parseFloat((q('#m2Total')&&q('#m2Total').textContent)||'0')||0;
  const rate=parseFloat((q('#rate')&&q('#rate').value)||'0')||0;
  const euro=r2(m2*rate);
  const up=(q('#paidUpfront')&&q('#paidUpfront').checked);
  const paid=up?(parseFloat((q('#clientPaid')&&q('#clientPaid').value)||'0')||0):0;
  const debt=Math.max(0, r2(euro-paid)), change=Math.max(0, r2(paid-euro));
  return {m2, rate, euro, paidUp:up, paid, debt, change};
}
function baseData(status='pranim'){
  const meta = (()=>{ try{return JSON.parse(localStorage.getItem('order_meta_'+OID)||'{}')}catch(e){return{}} })();
  return {
    id:OID, ts:Date.now(), status,
    client:{ name:(q('#name')?q('#name').value.trim():''), phone:(q('#phonePrefix')?q('#phonePrefix').value:'')+(q('#phone')?q('#phone').value.trim():''), code: meta.code||'', photoKey:'photo_client_'+OID },
    tepiha: readRows('tepiha'),
    staza:  readRows('staza'),
    shkallore:{ qty: parseFloat(window.STAIRS_QTY||0)||0, per: parseFloat(window.STAIRS_PER||0.3)||0.3, photoKey: ('photo_shkallore_'+OID) },
    pay: totalsObj()
  };
}
function saveIndexEntry(){
  let idx=[]; try{ idx=JSON.parse(localStorage.getItem(LIST_KEY)||'[]'); }catch(e){ idx=[]; }
  const entry={ id:OID, name:(q('#name')?q('#name').value.trim():''), phone:(q('#phonePrefix')?q('#phonePrefix').value:'')+(q('#phone')?q('#phone').value.trim():'') };
  const i=idx.findIndex(x=>x.id===entry.id); if(i>=0) idx[i]=entry; else idx.unshift(entry);
  localStorage.setItem(LIST_KEY, JSON.stringify(idx.slice(0,200)));
}
function saveDraftLocal(status='pranim'){
  const data=baseData(status);
  try{ localStorage.setItem(KEY(OID), JSON.stringify(data)); saveIndexEntry(); return data; }
  catch(e){ alert('S’u ruajt drafti (storage i plotë?)'); return null; }
}
async function saveDraftOnline(data){
  try{
    if(!CFG.syncOrders || !sb) return true;
    const path = `orders/${data.id}.json`;
    const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
    const { error } = sb.storage.from(CFG.supabase.bucket)
      .upload(path, blob, { upsert:true, contentType:'application/json' });
    if(error) throw error;
    if(data && data.client && /^-\d+$/.test(data.client.code||'')){
      const n=(data.client.code||'').replace(/^-/,'');
      const usedPath=`codes/d${n}.used`;
      const info = new Blob([JSON.stringify({ts:Date.now(),id:data.id})],{type:'application/json'});
      await sb.storage.from(CFG.supabase.bucket).upload(usedPath, info, { upsert:true, contentType:'application/json' });
    }
    return true;
  }catch(err){
    console.warn('Online sync failed:', err?.message||err);
    return false;
  }
}

/* ====== UI: rows add/remove ====== */
const listFor=sec=> q('#list-'+sec);
window.addRow=function(section,value, preset){
  const list=listFor(section); if(!list) return;
  const row=document.createElement('div'); row.className='piece-row';
  const mWrap=document.createElement('div'); mWrap.className='mwrap';
  const m2=document.createElement('input'); m2.className='input piece-input'; m2.placeholder='m²'; m2.inputMode='decimal';
  if(value!=null) m2.value=value; if(preset&&preset.m2!=null) m2.value=preset.m2;

window.STAIRS_QTY=0; window.STAIRS_PER=0.3; const STAIRS_PHOTO_KEY=()=>('photo_shkallore_'+OID);
function computeStairs(){
  const m2=r2((parseFloat(window.STAIRS_QTY)||0)*(parseFloat(window.STAIRS_PER)||0.3));
  (q('#stairsM2')||{}).textContent=m2.toFixed(2)+' m²'; 
  return m2;
}

/* ====== TOTALS ====== */
window.computeTotals=function(){
  const tT=readRows('tepiha').reduce((s,r)=>s+(r.m2||0)*(r.qty||1),0);
  const tS=readRows('staza').reduce((s,r)=>s+(r.m2||0)*(r.qty||1),0);
  const tSt=(window.STAIRS_QTY>0)? computeStairs() : 0;
  (q('#tot-tepiha')||{}).textContent=r2(tT).toFixed(2)+' m²';
  (q('#tot-staza')||{}).textContent=r2(tS).toFixed(2)+' m²';
  if(window.STAIRS_QTY<=0){ (q('#stairsM2')||{}).textContent='0.00 m²'; }
  const m2=r2(tT+tS+ (window.STAIRS_QTY>0? (window.STAIRS_QTY*window.STAIRS_PER):0));
  (q('#m2Total')||{}).textContent=m2.toFixed(2);
  const rate=parseFloat((q('#rate')&&q('#rate').value)||'0')||0;
  (q('#euroTotal')||{}).textContent=r2(m2*rate).toFixed(2);
};

  const change=document.createElement('input'); change.id='change'; change.readOnly=true; change.style.display='none';
  document.body.append(r,pu,cp,debt,change);

  const existing = loadOrder(OID);
  const metaKey='order_meta_'+OID; let meta={}; try{ meta=JSON.parse(localStorage.getItem(metaKey)||'{}')||{} }catch{}
  if(existing){
    q('#name').value = existing.client?.name || '';
    const ph = existing.client?.phone || '';
    const pfx = q('#phonePrefix')?.value || '+383';
    q('#phone').value = ph.replace(pfx,'');

    fillRowList('tepiha', existing.tepiha||[]);
    fillRowList('staza', existing.staza||[]);
    if(existing.client?.code){ meta.code = existing.client.code; }
  }
  if(meta.code && /^X\d+$/i.test(meta.code)){ meta.code = '-' + meta.code.replace(/^X/i,''); }
  if(!meta.code){
    const dash = await reserveDashCode();
    meta.code = dash;
  }
  localStorage.setItem(metaKey, JSON.stringify(meta));
  displayCode(meta.code);

  computeTotals();
})();

/* ====== SMS (tap=SMS, mbaje=WhatsApp/Viber) ====== */
(function(){
  const btn = document.getElementById('btnSms'); if(!btn) return;
  const sanitizeDigits = s => (s||'').replace(/[^\d]/g,'');
  function buildMessage(){
    const name  = (q('#name')?.value||'Klient');
    const m2    = (q('#m2Total')?.textContent||'0.00');
    const euro  = (q('#euroTotal')?.textContent||'0.00');
    const rowsT = qq('#list-tepiha .piece-row').length;
    const rowsS = qq('#list-staza .piece-row').length;
    const stairsM2 = parseFloat((q('#stairsM2')?.textContent||'0').replace(/[^\d.]/g,''))||0;
    const pieces = rowsT + rowsS + (stairsM2>0 ? 1 : 0);
    return `Përshëndetje ${name}, procesi i pastrimit ka filluar.\nKeni ${pieces} copë = ${m2} m².\nTotali: ${euro} €.\nFaleminderit!`;
  }
  function openSMS(){
    const digits = sanitizeDigits(`${q('#phonePrefix')?.value||''}${q('#phone')?.value||''}`);
    const enc = encodeURIComponent(buildMessage());
    const sms = digits ? `sms:${digits}?body=${enc}` : `sms:?body=${enc}`;
    location.href=sms;
  }
  function openSheet(){
    const msg=buildMessage();
    const digits = sanitizeDigits(`${q('#phonePrefix')?.value||''}${q('#phone')?.value||''}`);
    const enc = encodeURIComponent(msg);
    const viber = `viber://forward?text=${enc}`;
    const wa = digits ? `https://wa.me/${digits}?text=${enc}` : `https://wa.me/?text=${enc}`;
    const ov=document.createElement('div'); ov.className='ov';
    const box=document.createElement('div'); box.className='sheet';
    function mkBtn(label, href){
      const a=document.createElement('a'); a.textContent=label; a.href=href; a.target='_blank'; a.rel='noopener';
      a.className='btn'; a.style.cssText='display:block;text-decoration:none;margin:8px 4px';
      return a;
    }
    const title=document.createElement('div'); title.textContent='Dërgo me:'; title.style.cssText='color:#eaf1ff;font-weight:1000;font-size:1.2rem;margin:4px 4px 10px';
    box.appendChild(title);
    box.appendChild(mkBtn('Viber',viber));
    box.appendChild(mkBtn('WhatsApp',wa));
    const cancel=document.createElement('button'); cancel.textContent='Anulo'; cancel.className='btn ghost'; cancel.style.cssText='width:100%;margin:8px 4px 0'; cancel.onclick=()=>ov.remove(); box.appendChild(cancel);
    ov.appendChild(box); ov.addEventListener('click',e=>{ if(e.target===ov) ov.remove(); });
    document.body.appendChild(ov);
  }
  let pressTimer=null;
  btn.addEventListener('touchstart',()=>{ pressTimer=setTimeout(openSheet,500) },{passive:true});
  btn.addEventListener('touchend',()=>{ if(pressTimer){ clearTimeout(pressTimer); pressTimer=null; openSMS(); } },{passive:true});
  btn.addEventListener('mousedown',()=>{ pressTimer=setTimeout(openSheet,500) });
  btn.addEventListener('mouseup',()=>{ if(pressTimer){ clearTimeout(pressTimer); pressTimer=null; openSMS(); }});
})();

});

// GPT-INJECT: PRANIMI code claim hook
(function(){
  if (window.__pranimPatched) return; window.__pranimPatched=true;
  function attach() {
    const btn = document.querySelector('#save, #vazhdo, button[data-action="save"], button[data-action="continue"]');
    if (!btn) return;
    btn.addEventListener('click', function(ev){
      try {
        let o = window.currentOrder || {};
        if (!o.name) {
          const nameEl = document.querySelector('[name="name"], #name, input[name="client_name"]');
          if (nameEl) o.name = nameEl.value || o.name;
        }
        if (!o.code || !/^-\d+$/.test(o.code)) {
          const claimed = (window.claimNextCode && window.claimNextCode()) || null;
          if (claimed) {
            o.code = claimed.code;
            o.code_n = claimed.code_n;
          }
        }
        o.status = 'pastrim';
        if (!o.id) { o.id = o.code; }
        if (o.id) {
          localStorage.setItem('order_'+o.id, JSON.stringify(o));
        }
        try { window.unifiedList.upsert(o); } catch(e){}
        window.currentOrder = o;
      } catch(e){ console.warn('pranim hook error', e); }
    }, {capture:true});
  }
  const ro = new MutationObserver(()=>attach());
  ro.observe(document.documentElement,{childList:true,subtree:true});
  attach();
})();
</script>

(function(){

  // Initial paint

    setTimeout(preview, 0);
  } else {
    document.addEventListener('DOMContentLoaded', preview);
  }
  // After claim, re-paint if claimNextCode used elsewhere
  window.addEventListener('storage', function(ev){
    if(ev && ev.key==='code_counter'){ preview(); }
  });
  // Expose for manual refresh
  window.__refreshTicketCode = preview;
})();
