<!DOCTYPE html>
<html lang="sq">
<head><base href="/"/>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport"/>
<title>MARRJE SOT • Të marrë sot</title>
<style>
:root{
  --bg:#0b1220; --bg2:#0a111c; --panel:#0f1a2a; --line:#1f2e46;
  --ink:#eaf1ff; --muted:#9fb4d6;
}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
.app{max-width:960px;margin:0 auto;padding:14px}
.header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(180deg,#254369,#15263c);border:1px solid #203651;display:flex;align-items:center;justify-content:center}
.header h1{margin:0;font-size:22px;letter-spacing:.6px}
.header-tools{margin-left:auto;display:flex;align-items:center;gap:8px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;border:1px solid #21446c;background:linear-gradient(180deg,#173555,#10263d);font-weight:1000}
.panel{background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid var(--line);border-radius:14px;padding:12px}
.list{margin-top:10px;display:flex;flex-direction:column;gap:8px}
.row{display:flex;justify-content:space-between;align-items:center;padding:12px;border-radius:12px;background:#0e1930;border:1px solid var(--line)}
.meta{font-size:12px;color:var(--muted)}
.total{font-weight:1000;min-width:86px;text-align:right}
</style>


<link href="/clients_list_styles.css" rel="stylesheet"/>


<style>
/* HARD HIDE: reset buttons & any error toasts/overlays */
button#reset, .reset, [data-role="reset"], button[data-reset], a.reset, .btn-reset { display:none !important; }
#js-error, .js-error, .error-toast, .error-bar, .dev-error, .error-overlay, .err-overlay, .toast-error { display:none !important; visibility:hidden !important; opacity:0 !important; pointer-events:none !important; }
</style>
</head>
<body>
<div class="app">
<div class="header">
<div class="logo">📦</div>
<h1>MARRJE SOT • Të marrë sot</h1>
<div class="header-tools">
<div class="badge" id="totEuro">0.00 €</div>
<a class="badge" href="/">🏠 Home</a>
</div>
</div>
<div class="panel">
<div class="list" id="list"></div>
</div>
</div>

  <script src="../assets/engine/config.js"></script>
  <script src="../assets/engine/utils.js"></script>
  <script src="../assets/engine/app.js"></script>
  <script src="../assets/engine/adapter_marrje.js"></script>
</body>
</html>
