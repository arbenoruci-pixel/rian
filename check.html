<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="utf-8">
  <title>Supabase Check</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/env.js"></script>
  <script src="/assets/supabaseClient.js"></script>
</head>
<body style="background:#0b1220;color:#fff;font-family:system-ui;padding:20px">
  <h1>🔍 Supabase Connection Test</h1>
  <pre id="out">Loading…</pre>

<script>
(async ()=>{
  const out = document.getElementById('out');
  try {
    // Test SELECT
    let sel = await sb.from('payments').select('*').limit(1);
    // Test INSERT (harmless demo row)
    let ins = await sb.from('payments').insert({
      order_id:'TEST-CHECK',
      client_code:'C000',
      client_name:'Check Client',
      total: 1, received: 1, change: 0, debt: 0
    }).select();

    out.textContent =
      "✅ SELECT status: " + sel.status + "\\n" +
      "✅ INSERT status: " + ins.status + "\\n" +
      "Inserted row: " + JSON.stringify(ins.data, null, 2);
  } catch(e){
    out.textContent = "❌ ERROR:\\n" + e.message;
  }
})();
</script>

<script src="reset_admin.js"></script>

<script src="ux_fastlane.js"></script>

<script src="./flow_lockdown.js"></script>
</body>
</html>
