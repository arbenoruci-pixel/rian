<!DOCTYPE html>
<html lang="sq">
<head><base href="/"/>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport"/>
<title>PASTRIMI • Në proces</title>
<style>
:root{
  --bg:#0b1220; --bg2:#0a111c; --panel:#0f1a2a; --line:#1f2e46;
  --ink:#eaf1ff; --muted:#9fb4d6;
  --blue1:#1aa5d8; --blue2:#146b95;
  --green:#19a25f; --amber:#c78a2a; --red:#ef4444;
}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
a{color:inherit;text-decoration:none}
button{cursor:pointer}

.app{max-width:960px;margin:0 auto;padding:14px}
.header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(180deg,#254369,#15263c);border:1px solid #203651;display:flex;align-items:center;justify-content:center}
.header h1{margin:0;font-size:22px;letter-spacing:.6px}
.header-tools{margin-left:auto;display:flex;align-items:center;gap:8px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;border:1px solid #21446c;background:linear-gradient(180deg,#173555,#10263d);font-weight:1000}
.home{background:linear-gradient(180deg,#2aa0d8,#1773a8);border:1px solid #1b6b99}

/* Panel & search */
.panel{background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid var(--line);border-radius:14px;padding:12px}
.searchRow{display:grid;grid-template-columns:1fr auto;gap:8px;margin:8px 0}
.input{padding:12px;border-radius:10px;border:1px solid var(--line);background:#0e1730;color:#fff;font-weight:900;letter-spacing:.6px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 14px;border-radius:10px;border:1px solid #2aa7d8;background:linear-gradient(180deg,var(--blue1),var(--blue2));font-weight:1000;color:#fff}

/* List */
.list{margin-top:10px;display:flex;flex-direction:column;gap:8px}
.row{display:flex;justify-content:space-between;align-items:center;padding:12px;border-radius:12px;background:#0e1930;border:1px solid var(--line)}
.left{flex:1;min-width:0}
.top{font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta{font-size:12px;color:var(--muted)}
.total{font-weight:1000;min-width:80px;text-align:right}
.badges{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap}
.badgeDebt{display:inline-flex;align-items:center;padding:3px 8px;border-radius:999px;font-size:12px;font-weight:900;background:#b45309;color:#fff;border:1px solid #7a3a08}

/* Bottom sheet */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;z-index:9999}
.sheet{background:#0c0f16;border:1px solid #273143;border-radius:14px 14px 0 0;width:100%;max-width:680px;padding:16px}
.sheet h3{margin:0 0 6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pill{display:flex;justify-content:space-between;align-items:center;background:#0b111d;border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-weight:1000}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.chip{padding:8px 12px;border-radius:10px;border:1px solid var(--line);background:#101a31;color:#eaf1ff;font-weight:900}
.btnbar{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn.small{padding:10px 12px;border-radius:10px}
.btn.green{background:linear-gradient(180deg,var(--green),#0e6d3d);border:1px solid #0e6d3d}
.btn.orange{background:linear-gradient(180deg,var(--amber),#8a5f19);border:1px solid #8a5f19}
.btn.ghost{background:#0c1220;color:#e6f0ff;border:1px solid #2b3956}
.note{color:#cfe0ff;font-size:12px;margin-top:4px}
</style>
<!-- Supabase -->





<link href="/clients_list_styles.css" rel="stylesheet"/>


<style>
/* HARD HIDE: reset buttons & any error toasts/overlays */
button#reset, .reset, [data-role="reset"], button[data-reset], a.reset, .btn-reset { display:none !important; }
#js-error, .js-error, .error-toast, .error-bar, .dev-error, .error-overlay, .err-overlay, .toast-error { display:none !important; visibility:hidden !important; opacity:0 !important; pointer-events:none !important; }
</style>
</head>
<body>
<div class="app">
<div class="header">
<div class="logo">🧼</div>
<h1>PASTRIMI • Në proces</h1>
<div class="header-tools">
<div class="badge" id="totM2">0.00 m²</div>
<a class="badge home" href="/">🏠 Home</a>
</div>
</div>
<div class="panel">
<div class="searchRow">
<input class="input" id="q" placeholder="-1, emër ose telefon"/>
<button class="btn" id="btnSearch">KËRKO</button>
</div>
<div class="list" id="list"></div>
</div>
</div>















  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../assets/engine/config.js"></script>
  <script src="../assets/engine/utils.js"></script>
  <script src="../assets/engine/app.js"></script>
  <script src="../assets/engine/adapter_pastrimi.js"></script>
</body>
</html>
